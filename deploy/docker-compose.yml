version: '3.8'

services:
  mysql:
    image: mysql:8.0.36
    container_name: watertown-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: water_town
      MYSQL_USER: water_town
      MYSQL_PASSWORD: password123
    ports:
      - "3306:3306"
    volumes:
      - ../backend/data/migrations:/docker-entrypoint-initdb.d
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: watertown-jaeger
    ports:
      - "16686:16686"      # Jaeger UI
      - "4318:4318"        # OTLP HTTP receiver
      - "4317:4317"        # OTLP gRPC receiver
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      TZ: Asia/Shanghai
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /usr/share/zoneinfo/Asia/Shanghai:/usr/share/zoneinfo/Asia/Shanghai:ro
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: watertown-backend
    ports:
      - "8080:8080"
    env_file:
      - ../.env
    environment:
      CONFIG_FILE: "configs/config-docker.yaml"
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: water_town
      DB_PASSWORD: password123
    volumes:
      - ../backend/data:/app/data
      - ../backend/configs:/app/configs
      - ../backend/logs:/app/logs
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      mysql:
        condition: service_healthy
      jaeger:
        condition: service_started
      langfuse-server:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    image: nginx:alpine
    container_name: watertown-frontend
    ports:
      - "3000:80"
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ../frontend:/usr/share/nginx/html
      - ../frontend/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: watertown-prometheus
    ports:
      - "9090:9090"
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
      - /etc/localtime:/etc/localtime:ro
      - /usr/share/zoneinfo/Asia/Shanghai:/usr/share/zoneinfo/Asia/Shanghai:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=2d'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: watertown-grafana
    ports:
      - "3001:3000"
    environment:
      TZ: Asia/Shanghai
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ../grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ../grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      prometheus:
        condition: service_started
    restart: unless-stopped

  langfuse-db:
    image: postgres:16
    container_name: watertown-langfuse-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_db:/var/lib/postgresql/data
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse-redis:
    image: redis:7-alpine
    container_name: watertown-langfuse-redis
    volumes:
      - langfuse_redis:/data
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:24
    container_name: watertown-langfuse-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: langfuse
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: langfuse
    volumes:
      - langfuse_clickhouse:/var/lib/clickhouse
      - ./clickhouse-config.xml:/etc/clickhouse-server/config.d/numa.xml:ro
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query=SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  langfuse-minio:
    image: minio/minio:latest
    container_name: watertown-langfuse-minio
    ports:
      - "9091:9090"
    environment:
      MINIO_ROOT_USER: langfuse
      MINIO_ROOT_PASSWORD: langfuse-secret
    command: server /data --console-address ":9090"
    volumes:
      - langfuse_minio:/data
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped

  langfuse-server:
    image: ghcr.io/langfuse/langfuse:3
    container_name: watertown-langfuse
    ports:
      - "3002:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@langfuse-db:5432/langfuse
      DIRECT_URL: postgresql://postgres:postgres@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3002
      NEXTAUTH_SECRET: watertown-langfuse-secret
      SALT: watertown-langfuse-salt
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      REDIS_CONNECTION_STRING: redis://langfuse-redis:6379
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: langfuse
      CLICKHOUSE_DB: langfuse
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse:langfuse@langfuse-clickhouse:9000/langfuse
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      LANGFUSE_AUTO_CLICKHOUSE_MIGRATION_DISABLED: "false"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse-events
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: langfuse-secret
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse-media
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: langfuse-secret
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
    volumes:
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      langfuse-db:
        condition: service_healthy
      langfuse-redis:
        condition: service_started
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-minio:
        condition: service_started
    restart: unless-stopped

  langfuse-worker:
    image: ghcr.io/langfuse/langfuse-worker:3
    container_name: watertown-langfuse-worker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@langfuse-db:5432/langfuse
      DIRECT_URL: postgresql://postgres:postgres@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: watertown-langfuse-secret
      SALT: watertown-langfuse-salt
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      REDIS_CONNECTION_STRING: redis://langfuse-redis:6379
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: langfuse
      CLICKHOUSE_DB: langfuse
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse:langfuse@langfuse-clickhouse:9000/langfuse
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      LANGFUSE_AUTO_CLICKHOUSE_MIGRATION_DISABLED: "false"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse-events
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: langfuse-secret
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse-media
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: langfuse-secret
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
    volumes:
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      langfuse-db:
        condition: service_healthy
      langfuse-redis:
        condition: service_started
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-minio:
        condition: service_started
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
  langfuse_redis:
  langfuse_clickhouse:
  langfuse_db:
  langfuse_minio:
