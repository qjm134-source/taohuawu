version: '3.8'

services:
  mysql:
    image: mysql:8.0.36
    container_name: watertown-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: water_town
      MYSQL_USER: water_town
      MYSQL_PASSWORD: password123
    ports:
      - "3306:3306"
    volumes:
      - ./backend/data/migrations:/docker-entrypoint-initdb.d
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: watertown-jaeger
    ports:
      - "16686:16686"      # Jaeger UI
      - "4318:4318"        # OTLP HTTP receiver
      - "4317:4317"        # OTLP gRPC receiver
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      TZ: Asia/Shanghai
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /usr/share/zoneinfo/Asia/Shanghai:/usr/share/zoneinfo/Asia/Shanghai:ro
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: watertown-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      CONFIG_FILE: "configs/config-docker.yaml"
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: water_town
      DB_PASSWORD: password123
    volumes:
      - ./backend/data:/app/data
      - ./backend/configs:/app/configs
      - ./backend/logs:/app/logs
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      mysql:
        condition: service_healthy
      jaeger:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    image: nginx:alpine
    container_name: watertown-frontend
    ports:
      - "3000:80"
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: watertown-prometheus
    ports:
      - "9090:9090"
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
      - /etc/localtime:/etc/localtime:ro
      - /usr/share/zoneinfo/Asia/Shanghai:/usr/share/zoneinfo/Asia/Shanghai:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=2d'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: watertown-grafana
    ports:
      - "3001:3000"
    environment:
      TZ: Asia/Shanghai
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      prometheus:
        condition: service_started
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
