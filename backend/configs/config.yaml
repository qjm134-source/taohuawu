server:
  port: 8080
  read_timeout: 30s
  write_timeout: 30s

database:
  host: localhost
  port: 3306
  name: water_town
  user: root
  password: ${DB_PASSWORD:-password123}

websocket:
  path: /ws/game
  ping_interval: 30s
  pong_wait: 35s
  write_wait: 10s
  message_size_limit: 1048576  # 1MB

llm:
  # 模型配置列表，按优先级排序
  models:
    - name: mimo-v2.5
      base_url: https://token-plan-cn.xiaomimimo.com/v1
      api_key: ${MIMO_API_KEY}
      enabled: true
      max_tokens: 300
      temperature: 0.5

    - name: qwen3.5-27b
      base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api_key: ${BAILIAN_API_KEY}
      enabled: true
      max_tokens: 500
      temperature: 0.7

  timeout: 60s           # 增加超时时间到 60 秒
  max_retries: 3         # 增加重试次数到 3 次
  retry_delay: 2s
  auto_switch: true      # 是否自动切换到下一个模型
  strategy: capability   # 路由策略: fixed/cost/latency/capability/fallback/weighted
  fallback_response:     # 当所有模型都失败时的兜底响应
    enabled: true
    welcome_message: "欢迎来到桃花坞！我是你的向导小桃。有什么我可以帮助你的吗？"

circuit:
  max_failures: 5
  failure_window: 30s
  recovery_time: 60s
  half_open_limit: 3

cost:
  max_history_messages: 10
  max_history_tokens: 4096
  summary_threshold: 20
  similarity_threshold: 0.85
  cache_ttl: 3600s
  summary_model: ""            # LLM 摘要使用的模型，留空则使用第一个启用的模型
  summary_timeout: 30s         # 摘要请求超时时间
  # Embedding API 配置（用于语义缓存）
  embedding:
    enabled: true
    type: remote                # remote 使用远程 API（推荐）; local 使用本地服务
    api_key: ${BAILIAN_API_KEY}  # 或直接填写 API Key（remote 模式必需）
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1           # remote API 地址 / local 服务地址
    model: text-embedding-v1
    server_type: ollama          # local 模式后端类型: ollama / tei / openai-compat

knowledge:
  path: data/knowledge

logging:
  level: info
  format: text
  file:
    enabled: true
    path: logs/app.log
    max_size: 100    # MB
    max_backups: 3
    max_age: 28       # days
    compress: true

weather:
  provider: openmeteo                   # 天气服务提供商: qweather(和风) / openmeteo
  openmeteo:
    timeout: 15s                        # 请求超时时间
    max_retries: 3                      # 最大重试次数

observability:
  enabled: false
  service_name: watertown-guide
  endpoint: http://localhost:4318       # OTLP HTTP 端口（需先启动 Jaeger 或 OTel Collector）
  sample_rate: 1.0                      # 采样率，1.0=全量
  trace_exporter: stdout                # otlp：发送到外部 Collector；stdout：开发时打印到控制台
  prometheus: false                      # 是否启用 Prometheus 指标（/metrics 端点）
  langfuse:
    enabled: false                      # 是否启用 Langfuse LLM 专项可观测
    host: https://cloud.langfuse.com    # Langfuse 地址（自建填 http://localhost:3000）
    public_key: ${LANGFUSE_PUBLIC_KEY}  # Langfuse Public Key
    secret_key: ${LANGFUSE_SECRET_KEY}  # Langfuse Secret Key
