server:
  port: 8080
  read_timeout: 30s
  write_timeout: 30s

database:
  host: localhost
  port: 3306
  name: water_town
  user: root
  password: ${DB_PASSWORD:-password123}
  # MySQL doesn't use SSL mode in the same way
  # ssl_mode: disable

websocket:
  path: /ws/game
  ping_interval: 30s
  pong_wait: 35s
  write_wait: 10s
  message_size_limit: 1048576  # 1MB

llm:
  # 模型配置列表，按优先级排序
  models:
    - name: mimo-v2.5-pro
      type: claude  # 显式指定使用 Anthropic SDK，URL 路径中的 /anthropic 表示兼容 Anthropic Messages API
      base_url: https://token-plan-cn.xiaomimimo.com/anthropic
      api_key: ${MIMO_API_KEY}
      enabled: true
      max_tokens: 300
      temperature: 0.7

    - name: qwen3.5-27b
      base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api_key: ${BAILIAN_API_KEY}
      enabled: true
      max_tokens: 500
      temperature: 0.7

  timeout: 30s
  max_retries: 2
  retry_delay: 2s
  auto_switch: true  # 是否自动切换到下一个模型
  strategy: capability  # 路由策略: fixed/cost/latency/capability/fallback/weighted

circuit:
  max_failures: 5
  failure_window: 30s
  recovery_time: 60s
  half_open_limit: 3

cost:
  max_history_messages: 10
  max_history_tokens: 4096
  summary_threshold: 20
  similarity_threshold: 0.95
  cache_ttl: 3600s
  summary_model: ""            # LLM 摘要使用的模型，留空则使用第一个启用的模型
  summary_timeout: 30s         # 摘要请求超时时间

knowledge:
  path: data/knowledge

logging:
  level: info
  format: json
  file:
    enabled: true
    path: logs/app.log
    max_size: 100    # MB
    max_backups: 3
    max_age: 28       # days
    compress: true

observability:
  enabled: false
  service_name: watertown-guide
  endpoint: http://localhost:4318
  sample_rate: 1.0
